<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Cobranças — EBZ</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
<div class="sidebar">
  <div class="sidebar-logo"><div class="brand">🪨 EBZ Mármores</div><h6>Sistema de Orçamentos</h6></div>
  <nav class="sidebar-nav">
    <a href="dashboard.html" class="sidebar-link"><span class="icon">📊</span>Dashboard</a>
    <a href="orcamento.html" class="sidebar-link"><span class="icon">🧾</span>Novo Orçamento</a>
    <a href="historico.html" class="sidebar-link"><span class="icon">📋</span>Histórico</a>
    <a href="montador.html" class="sidebar-link"><span class="icon">🔧</span>Montador</a>
    <a href="clientes.html" class="sidebar-link"><span class="icon">👥</span>Clientes</a>
    <a href="cobrancas.html" class="sidebar-link active"><span class="icon">💰</span>Cobranças</a>
    <a href="configuracoes.html" class="sidebar-link"><span class="icon">⚙️</span>Configurações</a>
  </nav>
  <div class="sidebar-footer"><span id="sidebarUser"></span><br><a href="#" onclick="logout()" style="color:#c8d6e5;font-size:.8rem;">Sair</a></div>
</div>
<div class="main-content">
  <div class="top-bar">
    <h5>💰 Cobranças</h5>
    <button class="btn btn-sm btn-primary" onclick="abrirModalNova()">+ Nova Cobrança</button>
  </div>
  <div class="page-content">
    <!-- Cards resumo -->
    <div class="row g-3 mb-4">
      <div class="col-md-4">
        <div class="stat-card orange"><div class="label">Total a receber</div><div class="value" id="totalPendente">—</div></div>
      </div>
      <div class="col-md-4">
        <div class="stat-card green"><div class="label">Total recebido</div><div class="value" id="totalPago">—</div></div>
      </div>
      <div class="col-md-4">
        <div class="form-control h-100 d-flex align-items-center">
          <input type="text" id="busca" class="form-control border-0" placeholder="🔎 Buscar cliente...">
        </div>
      </div>
    </div>

    <div class="table-card">
      <div class="card-header">Cobranças registradas</div>
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead><tr>
            <th>Data</th><th>Cliente</th><th>Telefone</th><th>Descrição</th>
            <th class="text-end">Valor</th><th class="text-center">Status</th>
            <th class="text-center">Ações</th>
          </tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Modal nova cobrança -->
<div class="modal fade" id="modal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h6 class="modal-title">Nova Cobrança</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
      <div class="modal-body">
        <div class="mb-3"><label class="form-label">Cliente *</label>
          <select id="cobCliente" class="form-select"><option value="">Selecione...</option></select></div>
        <div class="mb-3"><label class="form-label">Descrição *</label><input type="text" id="cobDesc" class="form-control"></div>
        <div class="row g-2 mb-3">
          <div class="col"><label class="form-label">Valor (R$) *</label><input type="number" id="cobValor" class="form-control" step="0.01" min="0"></div>
          <div class="col"><label class="form-label">Data *</label><input type="text" id="cobData" class="form-control" placeholder="DD/MM/AAAA"></div>
        </div>
        <div class="mb-3"><label class="form-label">Status</label>
          <select id="cobStatus" class="form-select"><option>Pendente</option><option>Pago</option></select></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-primary" onclick="salvar()">Salvar</button>
      </div>
    </div>
  </div>
</div>

<div class="toast-container"><div id="toast" class="toast align-items-center text-white border-0">
  <div class="d-flex"><div class="toast-body" id="toastMsg"></div>
    <button type="button" class="btn-close btn-close-white me-2 m-auto" onclick="document.getElementById('toast').classList.remove('show')"></button>
  </div></div></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script><script src="js/auth.js"></script>
<script>
requireAuth();
document.getElementById("sidebarUser").textContent = getUsername();
let todos = [], clientes = [];
const modal = () => bootstrap.Modal.getOrCreateInstance(document.getElementById("modal"));

async function carregar() {
  const [cob, dash, cli] = await Promise.all([
    apiFetch("/cobrancas"),
    apiFetch("/cobrancas/dashboard"),
    apiFetch("/clientes"),
  ]);
  todos = cob || [];
  clientes = cli || [];
  document.getElementById("totalPendente").textContent = formatBRL(dash?.total_pendente||0);
  document.getElementById("totalPago").textContent = formatBRL(dash?.total_pago||0);

  // Preenche select de clientes
  const sel = document.getElementById("cobCliente");
  sel.innerHTML = '<option value="">Selecione...</option>';
  clientes.forEach(c => {
    const opt = document.createElement("option");
    opt.value = c.id; opt.textContent = c.nome; opt.dataset.tel = c.telefone||"";
    sel.appendChild(opt);
  });

  render(todos);
}

function render(list) {
  const tb = document.getElementById("tbody");
  tb.innerHTML = "";
  if (!list.length) { tb.innerHTML='<tr><td colspan="7" class="text-center text-muted py-4">Nenhuma cobrança encontrada</td></tr>'; return; }
  list.forEach(c => {
    const pago = c.status === "Pago";
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${c.data||""}</td><td><strong>${c.cliente||""}</strong></td>
      <td>${c.telefone||""}</td><td>${c.descricao||""}</td>
      <td class="text-end fw-bold">${formatBRL(c.valor)}</td>
      <td class="text-center"><span class="badge ${pago?"badge-pago":"badge-pendente"}" style="padding:4px 10px">${c.status}</span></td>
      <td class="text-center">
        <button class="btn btn-sm btn-outline-secondary me-1" onclick="toggleStatus(${c.id})" title="${pago?'Marcar pendente':'Marcar pago'}">${pago?"↩️":"✅"}</button>
        ${c.telefone ? `<button class="btn btn-sm btn-outline-success me-1" onclick="abrirWhatsapp(${c.id})" title="WhatsApp">💬</button>` : ""}
        <button class="btn btn-sm btn-outline-danger" onclick="excluir(${c.id})" title="Excluir">🗑️</button>
      </td>`;
    tb.appendChild(tr);
  });
}

document.getElementById("busca").addEventListener("input",function(){
  render(todos.filter(c=>(c.cliente||"").toLowerCase().includes(this.value.toLowerCase())));
});

function abrirModalNova() {
  document.getElementById("cobDesc").value="";
  document.getElementById("cobValor").value="";
  document.getElementById("cobData").value=today();
  document.getElementById("cobStatus").value="Pendente";
  modal().show();
}

async function salvar() {
  const sel = document.getElementById("cobCliente");
  const clienteId = sel.value;
  if (!clienteId) { showToast("Selecione um cliente","warning"); return; }
  const clienteOpt = sel.options[sel.selectedIndex];
  const nome = clienteOpt.textContent;
  const telefone = clienteOpt.dataset.tel || "";
  const descricao = document.getElementById("cobDesc").value.trim();
  const valor = parseFloat(document.getElementById("cobValor").value)||0;
  if (!descricao || valor <= 0) { showToast("Preencha descrição e valor","warning"); return; }
  try {
    await apiFetch("/cobrancas",{method:"POST",body:JSON.stringify({
      data:document.getElementById("cobData").value,
      cliente:nome, telefone, descricao, valor,
      status:document.getElementById("cobStatus").value,
      mensagem:"", origem:"manual", origem_id:null
    })});
    modal().hide();
    showToast("Cobrança salva!");
    carregar();
  } catch(e){ showToast(e.message,"error"); }
}

async function toggleStatus(id) {
  try {
    const res = await apiFetch(`/cobrancas/${id}/status`,{method:"PATCH"});
    showToast(`Status: ${res.status}`);
    carregar();
  } catch(e){ showToast(e.message,"error"); }
}

async function excluir(id) {
  if (!confirm("Excluir esta cobrança?")) return;
  try { await apiFetch(`/cobrancas/${id}`,{method:"DELETE"}); showToast("Excluída"); carregar(); }
  catch(e){ showToast(e.message,"error"); }
}

function abrirWhatsapp(id) {
  const c = todos.find(x=>x.id===id);
  if (!c) return;
  const tel = (c.telefone||"").replace(/\D/g,"");
  const fullTel = tel.startsWith("55") ? tel : "55"+tel;
  const empresa = localStorage.getItem("empresa") || "EBZ Mármores";
  const msg = `Olá, ${c.cliente}! Tudo bem? Aqui é da ${empresa}. Estou entrando em contato sobre a cobrança '${c.descricao}' no valor de ${formatBRL(c.valor)}. Data de referência: ${c.data||""}.`;
  const url = `https://wa.me/${fullTel}?text=${encodeURIComponent(msg)}`;
  window.open(url,"_blank");
}

carregar();
</script>
</body></html>
