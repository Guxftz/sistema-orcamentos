<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Histórico — EBZ</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
<div class="sidebar">
  <div class="sidebar-logo"><div class="brand">🪨 EBZ Mármores</div><h6>Sistema de Orçamentos</h6></div>
  <nav class="sidebar-nav">
    <a href="dashboard.html" class="sidebar-link"><span class="icon">📊</span>Dashboard</a>
    <a href="orcamento.html" class="sidebar-link"><span class="icon">🧾</span>Novo Orçamento</a>
    <a href="historico.html" class="sidebar-link active"><span class="icon">📋</span>Histórico</a>
    <a href="montador.html" class="sidebar-link"><span class="icon">🔧</span>Montador</a>
    <a href="clientes.html" class="sidebar-link"><span class="icon">👥</span>Clientes</a>
    <a href="cobrancas.html" class="sidebar-link"><span class="icon">💰</span>Cobranças</a>
    <a href="configuracoes.html" class="sidebar-link"><span class="icon">⚙️</span>Configurações</a>
  </nav>
  <div class="sidebar-footer"><span id="sidebarUser"></span><br><a href="#" onclick="logout()" style="color:#c8d6e5;font-size:.8rem;">Sair</a></div>
</div>
<div class="main-content">
  <div class="top-bar">
    <h5>📋 Histórico de Orçamentos</h5>
    <button class="btn btn-sm btn-outline-secondary" onclick="carregar()">↻ Atualizar</button>
  </div>
  <div class="page-content">
    <div class="table-card">
      <div class="card-header d-flex gap-3 align-items-center">
        <span>Todos os Orçamentos</span>
        <input type="text" id="busca" class="form-control form-control-sm" style="max-width:300px" placeholder="Buscar cliente, data ou número...">
      </div>
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead><tr>
            <th>Nº</th><th>Data</th><th>Cliente</th><th>Forma Pag.</th>
            <th class="text-end">Total</th><th class="text-center">Ações</th>
          </tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<div class="toast-container">
  <div id="toast" class="toast align-items-center text-white border-0">
    <div class="d-flex"><div class="toast-body" id="toastMsg"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" onclick="document.getElementById('toast').classList.remove('show')"></button>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/config.js"></script><script src="js/auth.js"></script>
<script>
requireAuth();
document.getElementById("sidebarUser").textContent = getUsername();
let todos = [];

async function carregar() {
  try {
    todos = await apiFetch("/orcamentos") || [];
    render(todos);
  } catch(e) { showToast(e.message,"error"); }
}

function render(orcs) {
  const tb = document.getElementById("tbody");
  tb.innerHTML = "";
  if (!orcs.length) { tb.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">Nenhum orçamento encontrado</td></tr>'; return; }
  orcs.forEach(o => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td><span class="badge bg-secondary">${String(o.numero||o.id).padStart(3,"0")}</span></td>
      <td>${o.data||""}</td><td><strong>${o.cliente||""}</strong></td>
      <td style="font-size:.83rem">${o.forma_pagamento||""}</td>
      <td class="text-end fw-bold">${formatBRL(o.total)}</td>
      <td class="text-center">
        <button class="btn btn-sm btn-outline-primary me-1" onclick="window.location.href='orcamento.html?id=${o.id}'" title="Editar">✏️</button>
        <button class="btn btn-sm btn-outline-success me-1" onclick="baixarPdf(${o.id})" title="PDF">📄</button>
        <button class="btn btn-sm btn-outline-secondary me-1" onclick="baixarExcel(${o.id})" title="Excel">📊</button>
        <button class="btn btn-sm btn-outline-warning me-1" onclick="duplicar(${o.id})" title="Duplicar">📋</button>
      </td>`;
    document.getElementById("tbody").appendChild(tr);
  });
}

document.getElementById("busca").addEventListener("input", function() {
  const q = this.value.toLowerCase();
  render(todos.filter(o => (o.cliente||"").toLowerCase().includes(q) || (o.data||"").includes(q) || String(o.numero||o.id).includes(q)));
});

async function baixarPdf(id) {
  const token = getToken();
  const res = await fetch(`${API_URL}/orcamentos/${id}/pdf`, { headers:{ Authorization:`Bearer ${token}` } });
  const blob = await res.blob();
  const url = URL.createObjectURL(blob);
  window.open(url,"_blank");
}

async function baixarExcel(id) {
  const token = getToken();
  const res = await fetch(`${API_URL}/orcamentos/${id}/excel`, { headers:{ Authorization:`Bearer ${token}` } });
  const blob = await res.blob();
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href=url; a.download=`orc_${id}.xlsx`; a.click();
}

async function duplicar(id) {
  window.location.href = `orcamento.html?id=${id}&duplicar=1`;
}

carregar();
</script>
</body></html>
