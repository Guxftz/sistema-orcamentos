<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sistema de Orçamentos — Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="text-center mb-4">
        <div style="font-size:2.5rem;">🪨</div>
        <h3>EBZ Mármores</h3>
        <p>Sistema de Orçamentos v2.0</p>
      </div>
      <form id="loginForm">
        <div class="mb-3">
          <label class="form-label">Usuário</label>
          <input type="text" id="username" class="form-control" value="admin" autocomplete="username">
        </div>
        <div class="mb-4">
          <label class="form-label">Senha</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary w-100" id="btnLogin">
          Entrar
        </button>
        <div id="loginError" class="alert alert-danger mt-3 d-none"></div>
      </form>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script>
    if (localStorage.getItem("token")) {
      window.location.href = "/dashboard.html";
    }

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("btnLogin");
      const errEl = document.getElementById("loginError");
      errEl.classList.add("d-none");
      btn.disabled = true;
      btn.textContent = "Entrando...";

      try {
        const res = await fetch(API_URL + "/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: document.getElementById("username").value,
            password: document.getElementById("password").value,
          }),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || "Erro");
        localStorage.setItem("token", data.access_token);
        localStorage.setItem("username", data.username);
        window.location.href = "/dashboard.html";
      } catch (err) {
        errEl.textContent = err.message;
        errEl.classList.remove("d-none");
      } finally {
        btn.disabled = false;
        btn.textContent = "Entrar";
      }
    });
  </script>
</body>
</html>
